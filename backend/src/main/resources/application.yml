spring:
  application:
    name: qhstore-api

  profiles:
    active: dev

  # Database Engine Connection (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate Configurations
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # File Upload Matrix (Multipart Configurations)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# Server Port Network Matrix
server:
  port: 8080
  servlet:
    context-path: /api/v1

# Custom Security & App Parameters (Extracted into .env)
app:
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration-ms: ${JWT_EXPIRATION_MS}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}
  security:
    pepper: ${APP_SECURITY_PEPPER}

logging:
  level:
    org:
      springframework:
        security:
          config:
            annotation:
              authentication:
                configuration:
                  InitializeUserDetailsBeanManagerConfigurer: ERROR