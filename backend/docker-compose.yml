version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qhstore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qhstore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - qhstore_postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: qhstore-redis
    ports:
      - "6379:6379"
    volumes:
      - qhstore_redis_data:/data
    restart: always

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: qhstore-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    restart: always
    depends_on:
      - redis

volumes:
  qhstore_postgres_data:
    driver: local
  qhstore_redis_data:
    driver: local