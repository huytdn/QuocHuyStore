version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qhstore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qhstore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - qhstore_postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  qhstore_postgres_data:
    driver: local